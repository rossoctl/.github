name: Deploy site to Pages

# Builds the Docusaurus site and deploys it to GitHub Pages.
#
# The Docs section is synced from kagenti/kagenti:docs-temp/ at build time
# (npm run sync-docs). Triggers:
#   - push to main            (site source changed)
#   - repository_dispatch     (docs-temp changed upstream; sent by
#                              kagenti/kagenti .github/workflows/docs-temp-dispatch.yaml)
#   - schedule                (daily fallback so docs never drift)
#   - workflow_dispatch       (manual)
on:
  push:
    branches: [main]
  repository_dispatch:
    types: [docs-temp-updated]
  schedule:
    - cron: "17 6 * * *" # daily 06:17 UTC fallback resync
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync docs from kagenti/kagenti:docs-temp
        run: npm run sync-docs

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
